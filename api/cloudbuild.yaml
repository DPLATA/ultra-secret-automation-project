# Cloud Build pipeline: build the api/ Dockerfile, push to Artifact Registry,
# deploy a new revision to the mlbsims-api Cloud Run service.
#
# Triggered by a push to main with changes under api/** (see the
# google_cloudbuild_trigger.api_deploy resource in terraform/cicd.tf).

steps:
  # 1. Build the image (tagged with the commit SHA AND latest)
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - -t
      - us-east1-docker.pkg.dev/$PROJECT_ID/mlbsims/mlbsims-api:$SHORT_SHA
      - -t
      - us-east1-docker.pkg.dev/$PROJECT_ID/mlbsims/mlbsims-api:latest
      - ./api

  # 2. Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - push
      - --all-tags
      - us-east1-docker.pkg.dev/$PROJECT_ID/mlbsims/mlbsims-api
    waitFor: ['build']

  # 3. Deploy to Cloud Run — pinned to the SHA so rollbacks are explicit
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mlbsims-api
      - --image=us-east1-docker.pkg.dev/$PROJECT_ID/mlbsims/mlbsims-api:$SHORT_SHA
      - --region=us-east1
      - --quiet
    waitFor: ['push']

images:
  - us-east1-docker.pkg.dev/$PROJECT_ID/mlbsims/mlbsims-api:$SHORT_SHA
  - us-east1-docker.pkg.dev/$PROJECT_ID/mlbsims/mlbsims-api:latest

# Cloud Build's default SA can't write to its default GCS bucket without
# extra perms; CLOUD_LOGGING_ONLY skips that path and streams to Cloud Logging.
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 600s
